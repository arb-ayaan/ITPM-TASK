<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAILY TASK - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h1>DAILY TASK</h1>
        <p>Welcome back!</p>

        <form action="#" method="POST">
            <div class="input-group">
                <input type="text" name="login_user" placeholder="Username or Email" required>
            </div>
            
            <div class="input-group">
                <input type="password" name="login_pass" placeholder="Password" required>
            </div>
            
            <input type="submit" value="Login" class="submit-btn">
        </form>

        <div class="footer-text">
            New user? <a href="signup2.html">Create an account</a>
        </div>
    </div>

</body>
</html>
